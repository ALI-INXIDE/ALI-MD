databases:
  - name: ali-md-db
    plan: free
    databaseName: ali-md
    user: ali-md

services:
  - type: web
    name: black-hat-md
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: SESSION_ID
        sync: false
      - key: MODE
        value: public
      - key: TIME_ZONE
        value: Asia/Karachi 
      - key: AUTO_LIKE_STATUS
        value: "true"
      - key: AUTO_READ_STATUS
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: ali-md-db
          property: connectionString
